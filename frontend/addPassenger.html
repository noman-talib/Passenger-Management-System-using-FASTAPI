<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Passenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="addbody">
    <div class="addcontainer">
        <h3>Add New Passenger</h3>
        
        <div>
            <input type="text" id="passengerName" placeholder="Enter your Name">
            <input type="text" id="passengerCnic" placeholder="Enter your CNIC">
        </div>
        <div>
            <input type="number" id="passengerAge" placeholder="Enter your Age" min="1" max="100">
            <select id="passengerGender">
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div>
            <input type="text" id="passengerDestination" placeholder="Enter your Destination">
            <input type="number" id="passengerFare" placeholder="Enter your Fare" >
        </div>
        
        <input type="tel" id="passengerPhone" placeholder="Enter your Phone Number" pattern="[0-9]{11}" required>
        
        <div>
            <button id="submitPassenger">Submit</button>
            <a href="index.html">
                <button class="back">Cancel</button>
            </a>
            <div id="addpassenger"></div> 
        </div>
    </div>
    <script src="add.js"></script>
</body>
</html>
